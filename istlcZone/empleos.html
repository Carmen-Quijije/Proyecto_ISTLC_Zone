<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bolsa de empleo | ISTLC Zone</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style-bolsa.css" />
    <link rel="icon" type="image/x-icon" href="images/iconoRed.ico" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
      <div class="container">
        <a class="navbar-brand logo-istlc" href="muro.html">
          <img
            src="images/logo.png"
            alt="Logo ISTLC Zone"
            class="logo-navbar"
          />
          <span class="texto-logo"> ISTLC </span>
        </a>

        <div class="ms-auto">
          <a href="muro.html" class="btn btn-warning me-2">Volver al muro</a>
          <button class="btn btn-light" onclick="cerrarSesion()">
            Cerrar sesion
          </button>
        </div>
      </div>
    </nav>

    <main class="perfil-page py-4">
      <section class="container">
        <div class="card shadow-sm p-4 mb-4">
          <h2 class="mb-2">Bolsa de empleo</h2>
          <p class="text-muted mb-4">
            Consulta vacantes disponibles para estudiantes y egresados.
          </p>

          <div class="row g-3 align-items-end">
            <div class="col-md-4">
              <label class="form-label" for="dateFilter">
                Filtrar por fecha
              </label>
              <select id="dateFilter" class="form-control">
                <option value="all">Todas las fechas</option>
                <option value="today">Fecha de consulta</option>
                <option value="week">Última semana</option>
                <option value="month">Último mes</option>
              </select>
            </div>

            <div class="col-md-3">
              <button
                class="btn btn-warning w-100 fw-bold"
                onclick="cargarEmpleos()"
              >
                Filtrar
              </button>
            </div>
          </div>
        </div>

        <div id="listaEmpleos">
          <div class="card shadow-sm p-4 text-muted">Cargando ofertas...</div>
        </div>
      </section>
    </main>

    <footer>
      <p>Proyecto Integrador | Derechos reservados ISTLC Zone © 2026</p>
    </footer>

    <script src="empleos.js"></script>
    <script src="notificaciones.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
