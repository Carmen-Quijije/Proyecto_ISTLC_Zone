<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Bolsa de empleo | ISTLC Zone</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="neon-theme.css" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />

    <link rel="icon" type="image/x-icon" href="images/iconoRed.ico" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
      <div class="container">
        <a class="navbar-brand logo-istlc" href="muro.html">
          <img
            src="images/logo.png"
            alt="Logo ISTLC Zone"
            class="logo-navbar"
          />
          <span class="texto-logo"> ISTLC </span>
        </a>

        <div class="ms-auto">
          <a href="muro.html" class="btn btn-warning me-2">Volver al muro</a>
          <button class="btn btn-light" onclick="cerrarSesion()">
            Cerrar sesión
          </button>
        </div>
      </div>
    </nav>

    <main class="perfil-page py-4">
      <section class="container">
        <div class="card shadow-sm p-4 mb-4">
          <h2 class="mb-2">Bolsa de empleo</h2>
          <p class="text-muted mb-4">
            Consulta vacantes disponibles para estudiantes y egresados.
          </p>

          <div class="row g-3 align-items-end">
            <div class="col-md-4">
              <label class="form-label" for="dateFilter">
                Filtrar por fecha
              </label>

              <select id="dateFilter" class="form-control">
                <option value="all">Todas las fechas</option>
                <option value="today">Fecha de consulta</option>
                <option value="week">Última semana</option>
                <option value="month">Último mes</option>
              </select>
            </div>

            <div class="col-md-3">
              <button
                class="btn btn-warning w-100 fw-bold"
                onclick="cargarEmpleos()"
              >
                Filtrar
              </button>
            </div>
          </div>
        </div>

        <div id="listaEmpleos">
          <div class="card shadow-sm p-4 text-muted">
            Cargando ofertas...
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>Proyecto Integrador | Derechos reservados ISTLC Zone © 2026</p>
    </footer>

    <script>
      async function cargarEmpleos() {
        const lista = document.getElementById("listaEmpleos");
        const filtroFecha = document.getElementById("dateFilter").value;

        lista.innerHTML = `
          <div class="card shadow-sm p-4 text-muted">
            Cargando ofertas...
          </div>
        `;

        try {
          const respuesta = await fetch(
            "https://www.arbeitnow.com/api/job-board-api"
          );

          const data = await respuesta.json();
          let empleos = data.data || [];

          empleos = empleos.filter((empleo) => {
            const fechaEmpleo = new Date(empleo.created_at * 1000);
            const hoy = new Date();

            if (filtroFecha === "today") {
              return fechaEmpleo.toDateString() === hoy.toDateString();
            }

            if (filtroFecha === "week") {
              const haceSemana = new Date();
              haceSemana.setDate(hoy.getDate() - 7);
              return fechaEmpleo >= haceSemana;
            }

            if (filtroFecha === "month") {
              const haceMes = new Date();
              haceMes.setMonth(hoy.getMonth() - 1);
              return fechaEmpleo >= haceMes;
            }

            return true;
          });

          empleos.sort((a, b) => b.created_at - a.created_at);

          if (!empleos.length) {
            lista.innerHTML = `
              <div class="card shadow-sm p-4">
                <p class="text-muted mb-0">
                  No se encontraron ofertas con el filtro seleccionado.
                </p>
              </div>
            `;
            return;
          }

          lista.innerHTML = empleos.map(tarjetaEmpleo).join("");
        } catch (error) {
          console.error(error);

          lista.innerHTML = `
            <div class="card shadow-sm p-4">
              <p class="text-danger mb-0">
                No se pudieron cargar las ofertas.
              </p>
            </div>
          `;
        }
      }

      function tarjetaEmpleo(empleo) {
        const fecha = new Date(empleo.created_at * 1000).toLocaleDateString(
          "es-EC",
          {
            day: "2-digit",
            month: "long",
            year: "numeric",
          }
        );

        const empleoSeguro = encodeURIComponent(JSON.stringify(empleo));

        return `
          <div class="card shadow-sm p-4 mb-3 empleo-card">
            <h4 class="mb-2">
              <a
                href="#"
                class="empleo-link"
                onclick="verDetalleEmpleo('${empleoSeguro}')"
              >
                ${empleo.title || "Vacante disponible"}
              </a>
            </h4>

            <p class="mb-1">
              <strong>Lugar:</strong>
              ${empleo.location || "No especificado"}
            </p>

            <p class="mb-0 text-muted">
              <strong>Fecha de publicación:</strong>
              ${fecha}
            </p>
          </div>
        `;
      }

      function verDetalleEmpleo(empleoTexto) {
        const empleo = JSON.parse(decodeURIComponent(empleoTexto));
        localStorage.setItem("empleoSeleccionado", JSON.stringify(empleo));
        window.location.href = "detalleEmpleo.html";
      }

      function cerrarSesion() {
        localStorage.removeItem("usuarioLogueado");
        window.location.href = "index.html";
      }

      cargarEmpleos();
    </script>

    <script src="notificaciones.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
