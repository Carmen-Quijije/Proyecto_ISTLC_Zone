<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recuperar cuenta | ISTLC Zone</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="neon-theme.css" />
    <link rel="icon" type="image/x-icon" href="images/iconoRed.ico" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
      <div class="container">
        <a class="navbar-brand logo-istlc" href="index.html">
          <img src="images/logo.png" alt="Logo ISTLC Zone" class="logo-navbar" />
          <span class="texto-logo"> ISTLC </span>
        </a>
      </div>
    </nav>

    <main class="registro-main">
      <section class="login-card registro-card">
        <h3 class="mb-3">Recuperar cuenta</h3>

        <form id="formSolicitarCodigo">
          <label class="form-label" for="email">Correo institucional</label>
          <input
            id="email"
            class="form-control mb-3"
            type="email"
            placeholder="correo@tecnologicoliceocristiano.edu.ec"
            required
          />
          <button id="btnEnviarCodigo" class="btn btn-primary w-100" type="submit">
            Enviar codigo
          </button>
        </form>

        <form id="formCambiarPassword" class="mt-4 d-none">
          <label class="form-label" for="codigo">Codigo recibido</label>
          <input
            id="codigo"
            class="form-control mb-3"
            maxlength="6"
            placeholder="123456"
            required
          />

          <label class="form-label" for="password">Nueva contraseña</label>
          <input
            id="password"
            class="form-control mb-3"
            type="password"
            minlength="6"
            required
          />

          <label class="form-label" for="confirmarPassword">Confirmar contraseña</label>
          <input
            id="confirmarPassword"
            class="form-control mb-3"
            type="password"
            minlength="6"
            required
          />

          <button id="btnCambiarPassword" class="btn btn-warning w-100 fw-bold" type="submit">
            Cambiar contraseña
          </button>
        </form>

        <a href="index.html" class="btn btn-light w-100 mt-3">Volver a iniciar sesion</a>
      </section>
    </main>

    <footer>
      <p>Proyecto Integrador | Derechos reservados ISTLC Zone © 2026</p>
    </footer>

    <script src="recuperar.js"></script>
  </body>
</html>
