<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mensajes | ISTLC Zone</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="neon-theme.css" />
    <link rel="icon" type="image/x-icon" href="images/iconoRed.ico" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
  <div class="container">
    <a class="navbar-brand logo-istlc" href="muro.html">
      <img
        src="images/logo.png"
        alt="Logo ISTLC Zone"
        class="logo-navbar"
      />
      <span class="texto-logo"> ISTLC </span>
    </a>

    <div class="ms-auto d-flex align-items-center gap-2">

      <button
        id="btnTema"
        class="btn btn-light"
        title="Cambiar tema"
      >
        🎨
      </button>

      <div class="dropdown">
        <button
          class="btn btn-warning position-relative"
          id="btnNotificaciones"
          data-bs-toggle="dropdown"
        >
          🔔
          <span
            id="contadorNotificaciones"
            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
          >
            0
          </span>
        </button>

        <div
          class="dropdown-menu dropdown-menu-end p-0"
          style="width: 420px;"
        >
          <div
            class="d-flex justify-content-between align-items-center p-3 border-bottom"
          >
            <strong>Notificaciones</strong>

            <button
              id="btnMarcarLeidas"
              class="btn btn-sm btn-light"
            >
              Marcar leídas
            </button>
          </div>

          <div
            id="listaNotificaciones"
            style="max-height: 450px; overflow-y: auto;"
          >
            <div class="p-3 text-muted">
              Cargando...
            </div>
          </div>
        </div>
      </div>

      <a href="muro.html" class="btn btn-warning">
        Muro
      </a>

      <button
        class="btn btn-light"
        onclick="cerrarSesion()"
      >
        Cerrar sesión
      </button>

    </div>
  </div>
</nav>

    <main class="perfil-page py-4">
      <section class="container">
        <div class="mensajes-layout">
          <aside class="card shadow-sm mensajes-sidebar">
            <div class="mensajes-sidebar-header">
              <h2>Mensajes</h2>
              <p class="text-muted mb-0">Busca una persona para iniciar una conversacion.</p>
            </div>

            <div class="input-group mb-3">
              <span class="input-group-text">
                <span class="material-symbols-outlined">search</span>
              </span>
              <input
                id="buscarMensajes"
                class="form-control"
                placeholder="Buscar companeros"
                autocomplete="off"
              />
            </div>

            <div id="listaContactos" class="mensajes-contactos"></div>
          </aside>

          <section class="card shadow-sm mensajes-chat">
            <div id="chatEncabezado" class="mensajes-chat-header">
              <div class="mensajes-vacio">
                <span class="material-symbols-outlined">forum</span>
                <h3>Selecciona una conversacion</h3>
                <p>Elige un contacto o busca a alguien para enviarle un mensaje.</p>
              </div>
            </div>

            <div id="chatMensajes" class="mensajes-lista"></div>

            <form id="formMensaje" class="mensajes-form d-none">
              <input
                id="textoMensaje"
                class="form-control"
                placeholder="Escribe un mensaje..."
                autocomplete="off"
              />
              <button class="btn btn-warning" type="submit">Enviar</button>
            </form>
          </section>
        </div>
      </section>
    </main>

    <footer>
      <p>Proyecto Integrador | Derechos reservados ISTLC Zone © 2026</p>
    </footer>

    <script src="mensajes.js"></script>
    <script src="proyecto_front_4_semestre.js"></script>
  </body>
</html>
