<!doctype html>
<html lang="es">
  <head>
    <link rel="stylesheet" href="neon-theme.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reportes | ISTLC Zone</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <link rel="icon" type="image/x-icon" href="images/iconoRed.ico" />
  </head>

  <body>
    <script src="notificaciones.js"></script>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
      <div class="container">
        <a class="navbar-brand logo-istlc" href="muro.html">
          <img src="images/logo.png" class="logo-navbar" alt="Logo" />
          <span class="texto-logo">ISTLC Zone</span>
        </a>

        <div class="ms-auto">
          <a href="muro.html" class="btn btn-warning me-2">Volver al muro</a>
          <button class="btn btn-light" onclick="cerrarSesion()">
            Cerrar sesion
          </button>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <section class="card shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h2 class="mb-1">Reportes</h2>
            <p class="text-muted mb-0">
              Revisa contenido marcado por los usuarios.
            </p>
          </div>
          <button class="btn btn-warning" type="button" onclick="cargarReportes()">
            Actualizar
          </button>
        </div>

        <div id="listaReportes" class="reportes-admin-lista">
          <p class="text-muted mb-0">Cargando reportes...</p>
        </div>
      </section>
    </main>

    <footer>
      <p>Proyecto Integrador | Derechos reservados ISTLC Zone &copy; 2026</p>
    </footer>

    <script src="adminReportes.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
