<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Editar perfil | ISTLC Zone</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <link rel="icon" type="image/x-icon" href="images/iconoRed.ico" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
      <div class="container">
        <a class="navbar-brand logo-istlc" href="muro.html">
          <img src="images/logo.png" alt="Logo ISTLC Zone" class="logo-navbar" />
          <span class="texto-logo"> ISTLC </span>
        </a>

        <div class="ms-auto">
          <a href="muro.html" class="btn btn-warning me-2">Muro</a>
          <button class="btn btn-light" onclick="cerrarSesion()">Cerrar sesion</button>
        </div>
      </div>
    </nav>

    <main class="perfil-page py-4">
      <section class="container">
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <div class="card shadow-sm p-4">
              <div class="d-flex align-items-center gap-3 mb-4">
                <label class="perfil-foto-editor" for="fotoPerfilArchivo">
                  <img
                    src="images/icono.png"
                    id="previewFoto"
                    class="perfil-form-foto"
                    alt="Foto perfil"
                  />
                  <span class="material-symbols-outlined">photo_camera</span>
                </label>
                <div>
                  <h2 class="mb-1">Editar perfil</h2>
                  <p class="text-muted mb-0">Haz clic en la foto para buscar una imagen en tu ordenador.</p>
                </div>
              </div>

              <form id="formEditarPerfil" class="row g-3">
                <div class="col-md-6">
                  <label class="form-label" for="nombre">Nombre completo</label>
                  <input class="form-control" id="nombre" required />
                </div>

                <div class="col-md-6">
                  <label class="form-label" for="fotoPerfilArchivo">Foto de perfil</label>
                  <input class="form-control" id="fotoPerfilArchivo" type="file" accept="image/*" />
                  <input id="fotoPerfil" type="hidden" />
                </div>

                <div class="col-md-6">
                  <label class="form-label" for="viveEn">Vive en</label>
                  <input class="form-control" id="viveEn" placeholder="Guayaquil" />
                </div>

                <div class="col-md-6">
                  <label class="form-label" for="lugarOrigen">De</label>
                  <input class="form-control" id="lugarOrigen" placeholder="Ciudad de origen" />
                </div>

                <div class="col-md-6">
                  <label class="form-label" for="fechaNacimiento">Fecha de nacimiento</label>
                  <input class="form-control" id="fechaNacimiento" type="date" />
                </div>

                <div class="col-md-6">
                  <label class="form-label" for="estadoCivil">Estado civil</label>
                  <select class="form-control" id="estadoCivil">
                    <option value="">No registrado</option>
                    <option>Soltero/a</option>
                    <option>En una relacion</option>
                    <option>Casado/a</option>
                    <option>Prefiero no decirlo</option>
                  </select>
                </div>

                <div class="col-md-6">
                  <label class="form-label" for="carrera">Carrera</label>
                  <input class="form-control" id="carrera" placeholder="Desarrollo de Software" />
                </div>

                <div class="col-md-6">
                  <label class="form-label" for="semestre">Semestre</label>
                  <input class="form-control" id="semestre" placeholder="4 semestre" />
                </div>

                <div class="col-12">
                  <label class="form-label" for="bio">Presentacion</label>
                  <textarea class="form-control" id="bio" rows="4" placeholder="Cuéntales algo sobre ti"></textarea>
                </div>

                <div class="col-12 d-flex gap-2 justify-content-end">
                  <a href="muro.html" class="btn btn-light">Cancelar</a>
                  <button class="btn btn-warning fw-bold" id="btnGuardar" type="submit">
                    Guardar cambios
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>Proyecto Integrador | Derechos reservados ISTLC Zone © 2026</p>
    </footer>

    <script src="editarPerfil.js"></script>
    <script src="notificaciones.js"></script>
  </body>
</html>
