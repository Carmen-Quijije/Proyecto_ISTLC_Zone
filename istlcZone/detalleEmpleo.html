<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Detalle de empleo | ISTLC Zone</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="neon-theme.css" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />

    <link rel="icon" type="image/x-icon" href="images/iconoRed.ico" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
      <div class="container">
        <a class="navbar-brand logo-istlc" href="muro.html">
          <img
            src="images/logo.png"
            alt="Logo ISTLC Zone"
            class="logo-navbar"
          />
          <span class="texto-logo"> ISTLC </span>
        </a>

        <div class="ms-auto">
          <a href="empleos.html" class="btn btn-warning me-2">
            Volver a bolsa de empleos
          </a>

          <button class="btn btn-light" onclick="cerrarSesion()">
            Cerrar sesión
          </button>
        </div>
      </div>
    </nav>

    <main class="perfil-page py-4">
      <section class="container">
        <div class="card shadow-sm p-4" id="detalleEmpleo">
          <p class="text-muted">Cargando detalle...</p>
        </div>
      </section>
    </main>

    <footer>
      <p>Proyecto Integrador | Derechos reservados ISTLC Zone © 2026</p>
    </footer>

    <script>
      const empleo = JSON.parse(localStorage.getItem("empleoSeleccionado"));
      const contenedor = document.getElementById("detalleEmpleo");

      if (!empleo) {
        contenedor.innerHTML = `
          <h3>No se encontró la vacante</h3>
          <p class="text-muted">
            Regresa a la bolsa de empleos y selecciona una oferta.
          </p>

          <a href="empleos.html" class="btn btn-warning">
            Volver a bolsa de empleos
          </a>
        `;
      } else {
        const fecha = new Date(empleo.created_at * 1000).toLocaleDateString(
          "es-EC",
          {
            day: "2-digit",
            month: "long",
            year: "numeric",
          }
        );

        contenedor.innerHTML = `
          <h2 class="mb-3">${empleo.title || "Vacante disponible"}</h2>

          <p>
            <strong>Empresa:</strong>
            ${empleo.company_name || "No disponible"}
          </p>

          <p>
            <strong>Lugar:</strong>
            ${empleo.location || "No especificado"}
          </p>

          <p>
            <strong>Fecha de publicación:</strong>
            ${fecha}
          </p>

          <hr>

          <h4>Detalle de la vacante</h4>

          <div class="empleo-descripcion">
            ${empleo.description || "No hay descripción disponible."}
          </div>

          <div class="mt-4 d-flex gap-2 flex-wrap">
            <a href="empleos.html" class="btn btn-light">
              Volver a bolsa de empleos
            </a>

            <a
              href="${empleo.url || "#"}"
              target="_blank"
              class="btn btn-warning fw-bold"
            >
              Ver oferta original
            </a>
          </div>
        `;
      }

      function cerrarSesion() {
        localStorage.removeItem("usuarioLogueado");
        window.location.href = "index.html";
      }
    </script>

    <script src="notificaciones.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
