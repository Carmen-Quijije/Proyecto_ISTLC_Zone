<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ISTLC Zone</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container">

        <a class="navbar-brand" href="#">
            ISTLC
        </a>

    </div>
</nav>

<!-- CONTENIDO PRINCIPAL -->
<main class="container main-login">

    <div class="row align-items-center">

        <!-- CARRUSEL -->
        <div class="col-md-5 separador">

           

                <button class="carousel-control-prev"
                        type="button"
                        data-bs-target="#carouselExample"
                        data-bs-slide="prev">

                    <span class="carousel-control-prev-icon"></span>

                </button>

                <button class="carousel-control-next"
                        type="button"
                        data-bs-target="#carouselExample"
                        data-bs-slide="next">

                    <span class="carousel-control-next-icon"></span>

                </button>

            </div>

            <!-- LEYENDA -->
            <div class="texto-carrusel">

                <p>
                    Conecta con tus compañeros, comparte ideas y forma parte de nuestra comunidad.
                </p>

            </div>

        </div>
               
        <!-- LOGIN -->
        <div class="col-md-7 fondo-login">
        
            <div class="login-card">
                
                <h3>Registro</h3>

                <form>

                    <div class="mb-3">
                        <input
                            type="email"
                            class="form-control"
                            placeholder="Correo electrónico"
                            required>
                    </div>

                    <div class="mb-3">
                        <input
                            type="password"
                            class="form-control"
                            placeholder="Contraseña"
                            required>
                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100">
                        Iniciar sesión
                    </button>

                    <br><br>

                    <a href="#" class="forgot-link">
                        ¿Olvidaste tu contraseña?
                    </a>

                    <hr>

                    <a
                        href="Registro.html"
                        class="btn btn-warning w-100">
                        Crear cuenta nueva
                    </a>
                    
                </form>

            </div>

        </div>

    </div>

</main>

<!-- FOOTER -->
<footer>
    <p>
        Derechos reservados | Proyecto integrador 4 semestre Desarrollo de Software
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
